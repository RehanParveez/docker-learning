services:
  db:
    container_name: postgresql_db
    image: postgres
    # automatically restarts the container - Docker daemon on restart or 
    # the container itself is manually restarted
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rehpostgre1
      POSTGRES_DB: test_db
    ports:
      - "5433:5432"
    networks:
      app_net:
        ipv4_address: 192.168.0.2
  pgadmin:
    container_name: pgadmin4
    image: dpage/pgadmin4
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: rparveez417@gmail.com
      PGADMIN_DEFAULT_PASSWORD: root
      # PGADMIN_LISTEN_PORT: 80
    ports:
      - "5050:80"
    networks:
      app_net:
        ipv4_address: 192.168.0.3

networks:
  app_net:
    ipam:
      driver: default
      config: 
        - subnet: "192.168.0.0/24"
          gateway: 192.168.0.1

volumes:
  postgres_data:
